<!DOCTYPE html>
<html>
<head>
    <title>Register - Todo List</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            width:450px;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#2c3e50;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#27ae60;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#219150;
        }

        .login{
            text-align:center;
            margin-top:15px;
        }

        a{
            text-decoration:none;
            color:#3498db;
        }

        ul.errorlist{
            color:red;
            margin-bottom:10px;
        }
    </style>

</head>
<body>

<div class="card">

    <h2>Register Account</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Daftar
        </button>
    </form>

    <div class="login">
        Sudah punya akun?
        <a href="/login/">Login</a>
    </div>

</div>

</body>
</html>
