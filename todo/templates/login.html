<!DOCTYPE html>
<html>
<head>
    <title>Login - Todo List</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            width:400px;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#2c3e50;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#2c3e50;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#34495e;
        }

        .register{
            text-align:center;
            margin-top:15px;
        }

        a{
            text-decoration:none;
            color:#3498db;
        }
    </style>

</head>
<body>

<div class="card">

    <h2>Todo List Login</h2>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">
            Login
        </button>
    </form>

    <div class="register">
        Belum punya akun?
        <a href="/register/">Register</a>
    </div>

</div>

</body>
</html>
